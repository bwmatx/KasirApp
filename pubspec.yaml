name: kasir_app
description: A simple Flutter POS app

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: "^3.11.0"

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.1.0
  intl: ^0.19.0
  audioplayers: ^5.2.1
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_vibrate: ^1.3.0
  fl_chart: ^0.68.0
  pdf: ^3.11.0
  printing: ^5.12.0
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  url_launcher: ^6.3.0
  flutter_contacts: ^1.1.7
  permission_handler: ^11.3.1
  whatsapp_share2: ^2.1.1

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/beep.mp3
